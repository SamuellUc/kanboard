version: '2'
services:
  db:
    image: 'mysql:8.0.3'
    restart: always
    ports:
      - 3306:3306
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=kanboard
      - MYSQL_USER=kanboard
      - MYSQL_PASSWORD=kanboard
    volumes:
      - db:/var/lib/mysql

  web:
    image: kanboard/kanboard:latest
    restart: always
    ports:
      - "8080:80"    # Cambiado de 80:80 a 8080:80
      # - "8443:443"  # Opcional: Eliminar si Nginx del host manejará SSL
      - "443:443"
    volumes:
      - kanboard_data:/var/www/app/data
      - kanboard_plugins:/var/www/app/plugins
      - kanboard_ssl:/etc/nginx/ssl
      # - kanboard_ssl:/etc/nginx/ssl  # Opcional: Eliminar si Nginx del host manejará SSL
    environment:
      DATABASE_URL: mysql://kanboard:kanboard@db/kanboard
    depends_on:
      - db
volumes:
  kanboard_data:
  kanboard_plugins:
  kanboard_ssl:
  # kanboard_ssl:  # Opcional
  db:
